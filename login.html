<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hotel Management System - Guest Login and Registration">
<meta name="author" content="Hotel Management System">
<title>Login - Hotel Management</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="flex-between">
    <div>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="hotels.html">Hotels</a>
      <a href="mybookings.html">My Bookings</a>
    </div>
    <div class="badge success">Guest Portal</div>
  </div>
</nav>

<div class="container">

  <div class="login-card fade-in" id="loginCard">

    <h2 class="text-center">Guest Login</h2>

    <div class="mt-2">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your registered email" autocomplete="off">
      <div class="muted-text">We’ll never share your email with anyone.</div>
    </div>

    <div class="mt-2">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <div class="mt-1 flex-between">
      <label>
        <input type="checkbox" id="rememberMe"> Remember me
      </label>
      <span class="muted-text">Forgot password?</span>
    </div>

    <div class="mt-2">
      <button style="width:100%" onclick="loginGuest()">Login</button>
    </div>

    <hr class="mt-3 mb-3">

    <h3 class="text-center">New Guest Registration</h3>

    <div class="mt-2">
      <label for="newName">Full Name</label>
      <input id="newName" placeholder="Your full name">
    </div>

    <div class="mt-2">
      <label for="newPhone">Phone</label>
      <input id="newPhone" placeholder="10-digit phone number">
    </div>

    <div class="mt-2">
      <label for="newEmail">Email</label>
      <input id="newEmail" placeholder="Email address">
    </div>

    <div class="mt-2">
      <label for="newAddress">Address</label>
      <input id="newAddress" placeholder="Full address">
    </div>

    <div class="mt-2">
      <label for="newIdProof">ID Proof</label>
      <input id="newIdProof" placeholder="Aadhar / Passport / Voter ID">
    </div>

    <div class="mt-2">
      <label for="newPassword">Create Password</label>
      <input id="newPassword" type="password" placeholder="Create a secure password">
    </div>

    <div class="mt-2">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" placeholder="Re-enter your password">
    </div>

    <div class="mt-2">
      <button style="width:100%" onclick="addGuest()">Register</button>
    </div>

  </div>

  <div class="mt-3 text-center muted-text">
    By logging in, you agree to our Terms of Service and Privacy Policy.
  </div>

</div>

<footer style="text-align:center; padding:20px; color:var(--muted);">
  Hotel Management System © 2025
</footer>

<script src="script.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const emailField = document.getElementById("email");
  const passwordField = document.getElementById("password");
  const newPasswordField = document.getElementById("newPassword");
  const confirmPasswordField = document.getElementById("confirmPassword");

  emailField.addEventListener("focus", () => {
    emailField.classList.add("glow");
  });

  emailField.addEventListener("blur", () => {
    emailField.classList.remove("glow");
  });

  passwordField.addEventListener("focus", () => {
    passwordField.classList.add("glow");
  });

  passwordField.addEventListener("blur", () => {
    passwordField.classList.remove("glow");
  });

  newPasswordField.addEventListener("focus", () => {
    newPasswordField.classList.add("glow");
  });

  newPasswordField.addEventListener("blur", () => {
    newPasswordField.classList.remove("glow");
  });

  confirmPasswordField.addEventListener("focus", () => {
    confirmPasswordField.classList.add("glow");
  });

  confirmPasswordField.addEventListener("blur", () => {
    confirmPasswordField.classList.remove("glow");
  });

  const inputs = document.querySelectorAll(".login-card input");
  inputs.forEach(inp => {
    inp.addEventListener("mouseenter", () => {
      inp.classList.add("highlight");
    });
    inp.addEventListener("mouseleave", () => {
      inp.classList.remove("highlight");
    });
  });

  const card = document.getElementById("loginCard");
  card.classList.add("fade-in");

  document.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("mouseenter", () => {
      btn.classList.add("glow");
    });
    btn.addEventListener("mouseleave", () => {
      btn.classList.remove("glow");
    });
  });

  const rememberMe = document.getElementById("rememberMe");
  rememberMe.addEventListener("change", () => {
    if (rememberMe.checked) {
      console.log("Remember me enabled");
    } else {
      console.log("Remember me disabled");
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      loginGuest();
    }
  });

  window.addEventListener("scroll", () => {
    const nav = document.querySelector("nav");
    if (window.scrollY > 10) {
      nav.classList.add("shadow-md");
    } else {
      nav.classList.remove("shadow-md");
    }
  });

});
</script>

</body>
</html>
