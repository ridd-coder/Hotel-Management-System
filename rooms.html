<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.page-wrapper {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-content {
  flex: 1;
}

.status-badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
}

.status-available {
  background: rgba(34, 197, 94, 0.15);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.3);
}

.status-booked {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

.room-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 8px 0;
}

.room-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.room-footer {
  margin-top: 12px;
}

.room-card {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.room-card:hover {
  transform: translateY(-2px);
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.filter-group {
  display: flex;
  gap: 10px;
  align-items: center;
}

.filter-group select {
  min-width: 160px;
}
</style>
</head>
<body>

<div class="page-wrapper">

<nav>
  <div class="flex-between">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="hotels.html">Hotels</a>
      <a href="mybookings.html">My Bookings</a>
    </div>
    <div class="nav-right">
      <span class="badge success">Rooms</span>
    </div>
  </div>
</nav>

<header style="background:linear-gradient(to right,#020617,#0f172a);padding:40px 0;border-bottom:1px solid var(--border);">
  <div class="container text-center">
    <h1 id="pageTitle">Available Rooms</h1>
    <p id="pageSubtitle">Select a room to proceed with booking</p>
  </div>
</header>

<div class="main-content">

<div class="container">

<div class="toolbar">
  <div class="toolbar-left">
    <h2 id="hotelTitle">Rooms</h2>
  </div>

  <div class="toolbar-right filter-group">
    <select id="statusFilter">
      <option value="all">All Rooms</option>
      <option value="Available">Available Only</option>
      <option value="Booked">Booked Only</option>
    </select>

    <button class="secondary" onclick="window.location.reload()">Refresh</button>
  </div>
</div>

<!-- IMPORTANT: This is where rooms will be injected -->
<div id="roomList" class="grid"></div>

</div>

</div>

<footer style="background:var(--bg-secondary);border-top:1px solid var(--border);margin-top:40px;">
  <div class="container text-center muted-text">
    Hotel Management System © 2025
  </div>
</footer>

</div>

<script src="script.js"></script>

<script>
const API_BASE = "http://localhost:4000";

document.addEventListener("DOMContentLoaded", () => {
  const hotelId = new URLSearchParams(window.location.search).get("hotel_id");

  if (!hotelId) {
    document.getElementById("roomList").innerHTML =
      `<div class="card text-center" style="grid-column:1/-1;padding:40px;">
         <h3>No hotel selected.</h3>
         <p>Please go back and choose a hotel.</p>
         <button onclick="window.location.href='hotels.html'" style="margin-top:16px;">Browse Hotels</button>
       </div>`;
    return;
  }

  // Load hotel name for page title
  fetch(`${API_BASE}/hotels`)
    .then(r => r.json())
    .then(hotels => {
      const h = hotels.find(x => x.hotel_id == hotelId);
      if (h) {
        const stars = "⭐".repeat(Math.round(h.rating || 0));
        document.getElementById("hotelTitle").innerText   = h.name + " — Rooms";
        document.getElementById("pageTitle").innerText    = h.name;
        document.getElementById("pageSubtitle").innerText =
          `${h.location}  ${stars}  ${h.rating}`;
      }
    })
    .catch(() => {});

  // Load rooms
  loadRooms(hotelId);

  // Filter
  document.getElementById("statusFilter").addEventListener("change", applyRoomFilter);
});

function loadRooms(hotelId) {
  const list = document.getElementById("roomList");
  list.innerHTML = `
    <div class="card text-center" style="grid-column:1/-1;padding:48px;">
      <div style="font-size:2rem;color:var(--primary);margin-bottom:12px;">⏳</div>
      <p>Loading rooms…</p>
    </div>`;

  fetch(`${API_BASE}/rooms/${hotelId}`)
    .then(r => r.json())
    .then(rooms => renderRooms(rooms, hotelId))
    .catch(() => {
      list.innerHTML = `
        <div class="card text-center" style="grid-column:1/-1;padding:48px;border-color:rgba(248,113,113,0.3);">
          <h3 style="color:var(--danger);">Could not load rooms</h3>
          <p>Make sure the backend server is running on port 4000.</p>
        </div>`;
    });
}

function renderRooms(rooms, hotelId) {
  const list = document.getElementById("roomList");
  list.innerHTML = "";

  if (!rooms || rooms.length === 0) {
    list.innerHTML = `
      <div class="card text-center" style="grid-column:1/-1;padding:60px 24px;">
        <div style="font-size:3rem;color:var(--primary);opacity:0.4;margin-bottom:16px;">🛏</div>
        <h3>No Rooms Found</h3>
        <p>This hotel currently has no listed rooms.</p>
      </div>`;
    return;
  }

  rooms.forEach((r, i) => {
    const isAvailable = r.availability_status === "Available";
    const statusClass = isAvailable ? "status-available" : "status-booked";
    const statusLabel = r.availability_status || "Unknown";

    const card = document.createElement("div");
    card.className = "card room-card fade-in";
    card.setAttribute("data-status", r.availability_status);
    card.style.animationDelay = (i * 0.07) + "s";
    card.style.position = "relative";
    card.style.overflow = "hidden";

    card.innerHTML = `
      <div class="card-accent-bar"></div>
      <div class="room-header">
        <span class="badge gold" style="font-size:0.68rem;">Room #${r.room_id}</span>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <h3 style="font-size:1.1rem;margin-bottom:8px;">${r.room_type}</h3>
      <div class="room-meta">
        <span style="color:var(--muted);font-size:0.85rem;">Price per night</span>
        <span style="color:var(--primary-light);font-weight:700;font-size:1.15rem;">₹${parseFloat(r.price_per_night).toLocaleString("en-IN")}</span>
      </div>
      <div class="room-footer">
        ${isAvailable
          ? `<button onclick="bookRoom(${r.room_id}, ${r.price_per_night}, ${hotelId})" style="width:100%;">
               <i class="fas fa-calendar-check"></i> Book Now
             </button>`
          : `<button disabled style="width:100%;opacity:0.45;cursor:not-allowed;background:rgba(100,100,100,0.2);color:var(--muted);">
               <i class="fas fa-ban"></i> Not Available
             </button>`
        }
      </div>
    `;
    list.appendChild(card);
  });
}

function bookRoom(roomId, price, hotelId) {
  const guestId = localStorage.getItem("guest_id");
  if (!guestId) {
    if (typeof showToast === "function") {
      showToast("Please login before booking a room.", "error");
    } else {
      alert("Please login first.");
    }
    setTimeout(() => { window.location.href = "login.html"; }, 1000);
    return;
  }
  localStorage.setItem("selected_room_id",   roomId);
  localStorage.setItem("selected_hotel_id",  hotelId);
  localStorage.setItem("selected_room_price", price);
  window.location.href = "booking.html";
}

function applyRoomFilter() {
  const filter = document.getElementById("statusFilter").value;
  document.querySelectorAll(".room-card").forEach(card => {
    const status = card.getAttribute("data-status");
    card.style.display = (filter === "all" || status === filter) ? "block" : "none";
  });
}
</script>

</body>
</html>
