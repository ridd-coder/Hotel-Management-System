<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="View and manage your hotel reservations — LuxeStay">
<title>My Bookings — LuxeStay</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ── Navigation ── -->
<nav id="main-nav">
  <div class="flex-between">
    <div style="display:flex;align-items:center;gap:32px;">
      <div class="nav-logo">
        <i class="fas fa-crown"></i> LuxeStay
      </div>
      <div>
        <a href="index.html"><i class="fas fa-home" style="margin-right:5px;"></i>Home</a>
        <a href="login.html"><i class="fas fa-sign-in-alt" style="margin-right:5px;"></i>Login</a>
        <a href="hotels.html"><i class="fas fa-hotel" style="margin-right:5px;"></i>Hotels</a>
        <a href="mybookings.html" style="color:var(--primary-light);"><i class="fas fa-calendar-check" style="margin-right:5px;"></i>My Bookings</a>
      </div>
    </div>
    <span class="badge gold"><i class="fas fa-calendar-check"></i> My Bookings</span>
  </div>
</nav>

<!-- ── Page Header ── -->
<div class="page-header">
  <div class="page-header-bg"></div>
  <div class="page-header-overlay"></div>
  <div class="page-header-content fade-in">
    <div class="hero-eyebrow" style="margin:0 auto 18px;"><i class="fas fa-calendar-check"></i> Reservations</div>
    <h1>Your Bookings</h1>
    <p>View, filter, and manage all your hotel reservations in one place.</p>
  </div>
</div>

<!-- ── Main Content ── -->
<div class="container">

  <!-- Filters Card -->
  <div class="card shadow-md mb-3 fade-in">
    <div class="flex-between" style="margin-bottom:20px;">
      <div>
        <h3 style="margin-bottom:4px;"><i class="fas fa-sliders-h" style="color:var(--primary);margin-right:8px;"></i>Filters</h3>
        <p style="font-size:0.85rem;margin:0;">Search and refine your booking history</p>
      </div>
      <button class="secondary" id="resetFilters" style="font-size:0.78rem;padding:9px 16px;">
        <i class="fas fa-undo"></i> Reset All
      </button>
    </div>

    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;align-items:end;">
      <div>
        <label><i class="fas fa-hashtag" style="margin-right:5px;"></i>Booking ID</label>
        <input type="number" id="searchBooking" placeholder="e.g. 101">
      </div>
      <div>
        <label><i class="fas fa-filter" style="margin-right:5px;"></i>Status</label>
        <select id="filterStatus">
          <option value="">All Statuses</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Pending">Pending</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div>
        <label><i class="fas fa-calendar" style="margin-right:5px;"></i>Check-in From</label>
        <input type="date" id="filterFrom">
      </div>
      <div>
        <label><i class="fas fa-calendar" style="margin-right:5px;"></i>Check-out To</label>
        <input type="date" id="filterTo">
      </div>
    </div>
  </div>

  <!-- Booking List Header -->
  <div class="flex-between mb-2">
    <h2 style="font-size:1.4rem;">
      <i class="fas fa-history" style="color:var(--primary);margin-right:10px;font-size:1.1rem;"></i>
      Booking History
    </h2>
    <button class="secondary" id="refreshBookings" style="font-size:0.78rem;padding:9px 16px;">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
  </div>

  <!-- Booking Cards Grid -->
  <div id="bookingList" class="grid stagger" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;"></div>

</div>

<!-- ── Footer ── -->
<footer>
  <div class="footer-inner">
    <div class="footer-bottom" style="justify-content:center;">
      <p>© 2025 LuxeStay Hotel Management. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script>
window.addEventListener("DOMContentLoaded", () => {

  window.addEventListener("scroll", () => {
    document.getElementById("main-nav").classList.toggle("shadow-md", window.scrollY > 10);
  });

  const filterStatus  = document.getElementById("filterStatus");
  const searchBooking = document.getElementById("searchBooking");
  const filterFrom    = document.getElementById("filterFrom");
  const filterTo      = document.getElementById("filterTo");
  const resetBtn      = document.getElementById("resetFilters");
  const refreshBtn    = document.getElementById("refreshBookings");
  const bookingList   = document.getElementById("bookingList");

  let allBookings = [];

  async function fetchBookings() {
    const guest_id = localStorage.getItem("guest_id");
    bookingList.innerHTML = `
      <div class="card text-center" style="grid-column:1/-1;padding:48px;">
        <div style="font-size:2rem;color:var(--primary);margin-bottom:12px;">
          <i class="fas fa-circle-notch fa-spin"></i>
        </div>
        <p>Loading your reservations…</p>
      </div>`;
    try {
      const res = await fetch("http://localhost:4000/getMyBookings/" + guest_id);
      allBookings = await res.json();
      renderBookings(allBookings);
    } catch {
      renderError();
    }
  }

  function renderError() {
    bookingList.innerHTML = `
      <div class="card text-center" style="grid-column:1/-1;padding:48px;border-color:rgba(248,113,113,0.3);">
        <div style="font-size:2.5rem;color:var(--danger);margin-bottom:16px;"><i class="fas fa-exclamation-triangle"></i></div>
        <h3 style="color:var(--danger);margin-bottom:8px;">Unable to Load Bookings</h3>
        <p>Please ensure you are logged in and the server is running.</p>
        <button class="secondary" onclick="fetchBookings()" style="margin-top:16px;"><i class="fas fa-redo"></i> Retry</button>
      </div>`;
  }

  function renderBookings(bookings) {
    bookingList.innerHTML = "";

    if (!bookings || bookings.length === 0) {
      bookingList.innerHTML = `
        <div class="card text-center" style="grid-column:1/-1;padding:60px 24px;">
          <div style="font-size:3rem;color:var(--primary);opacity:0.5;margin-bottom:16px;"><i class="fas fa-suitcase-rolling"></i></div>
          <h3 style="margin-bottom:10px;">No Bookings Found</h3>
          <p>Try adjusting your filters, or start your first booking today!</p>
          <button onclick="window.location.href='hotels.html'" style="margin-top:20px;">
            <i class="fas fa-compass"></i> Browse Hotels
          </button>
        </div>`;
      return;
    }

    bookings.forEach((b, i) => {
      const card = document.createElement("div");
      card.className = "card fade-in";
      card.style.animationDelay = (i * 0.07) + "s";
      card.style.position = "relative";
      card.style.overflow = "hidden";

      const isCancelled = b.status === "Cancelled";
      const isConfirmed = b.status === "Confirmed";
      const statusClass = isConfirmed ? "booking-status-confirmed" :
                          isCancelled ? "booking-status-cancelled" : "booking-status-pending";
      const statusIcon  = isConfirmed ? "fa-check-circle" :
                          isCancelled ? "fa-times-circle" : "fa-clock";
      const badgeClass  = isConfirmed ? "success" : isCancelled ? "danger" : "warning";

      card.innerHTML = `
        <div class="card-accent-bar"></div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
          <div>
            <p style="font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary);font-weight:700;margin:0 0 4px;">Booking</p>
            <h3 style="font-size:1.3rem;margin:0;">#${b.booking_id}</h3>
          </div>
          <span class="badge ${badgeClass}">
            <i class="fas ${statusIcon}"></i> ${b.status}
          </span>
        </div>
        <hr>
        <div style="margin:16px 0;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <div style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Room ID</div>
            <div style="color:var(--text);font-weight:600;">${b.room_id}</div>
          </div>
          <div>
            <div style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Total</div>
            <div style="color:var(--primary-light);font-weight:700;font-size:1.1rem;">₹${b.total_amount}</div>
          </div>
          <div>
            <div style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Check-in</div>
            <div style="color:var(--text);font-weight:500;">${b.check_in}</div>
          </div>
          <div>
            <div style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Check-out</div>
            <div style="color:var(--text);font-weight:500;">${b.check_out}</div>
          </div>
        </div>
        ${b.services ? `<p style="font-size:0.83rem;color:var(--text-sub);margin-bottom:16px;"><i class="fas fa-concierge-bell" style="color:var(--primary);margin-right:5px;"></i>${b.services}</p>` : ""}
        <hr>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
          ${isCancelled
            ? `<span class="badge danger"><i class="fas fa-ban"></i> Cancelled</span>`
            : `<button class="danger-btn" onclick="cancelBooking(${b.booking_id})" style="font-size:0.78rem;padding:9px 14px;">
                <i class="fas fa-times"></i> Cancel
               </button>`}
          ${isConfirmed
            ? `<button class="secondary" onclick="viewReceipt(${b.booking_id})" style="font-size:0.78rem;padding:9px 14px;">
                <i class="fas fa-receipt"></i> View Receipt
               </button>`
            : ""}
        </div>
      `;
      bookingList.appendChild(card);
    });
  }

  function applyFilters() {
    let filtered = [...allBookings];
    const status  = filterStatus.value;
    const searchId = searchBooking.value;
    const from    = filterFrom.value;
    const to      = filterTo.value;
    if (status)   filtered = filtered.filter(b => b.status === status);
    if (searchId) filtered = filtered.filter(b => b.booking_id.toString().includes(searchId));
    if (from)     filtered = filtered.filter(b => new Date(b.check_in) >= new Date(from));
    if (to)       filtered = filtered.filter(b => new Date(b.check_out) <= new Date(to));
    renderBookings(filtered);
  }

  filterStatus.addEventListener("change", applyFilters);
  searchBooking.addEventListener("input", applyFilters);
  filterFrom.addEventListener("change", applyFilters);
  filterTo.addEventListener("change", applyFilters);

  resetBtn.addEventListener("click", () => {
    filterStatus.value = searchBooking.value = filterFrom.value = filterTo.value = "";
    renderBookings(allBookings);
  });

  refreshBtn.addEventListener("click", fetchBookings);

  window.viewReceipt = id => { window.location.href = `receipt.html?booking_id=${id}`; };

  fetchBookings();
});
</script>

</body>
</html>
